<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriTrack AI - Team 4</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">🥗 NutriTrack AI</a>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row g-4">
            
            <div class="col-md-4">
                <div class="card h-100 shadow-sm">
                    <div class="card-body" id="health-profiler-section">
                        <h4 class="card-title text-primary">Health Profiler</h4>
                        <hr>
                        <p class="text-muted small"><em>Skylar: Build the form for Macro targets and allergy checkboxes here.</em></p>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card h-100 shadow-sm">
                    <div class="card-body" id="pantry-section">
                        <h4 class="card-title text-success">My Pantry</h4>
                        <hr>
                        <p class="text-muted small"><em>Earl & Lynn: Build the inventory list UI and Add/Remove buttons here.</em></p>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card h-100 shadow-sm">
                    <div class="card-body" id="recipe-results-section">
                        <h4 class="card-title text-info">Recipe Matches</h4>
                        <hr>
                        <p class="text-muted small"><em>Halle: Output the recipes you fetch from the API here.</em></p>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="pantry.js"></script>
    <script src="api.js"></script>
</body>
</html>
